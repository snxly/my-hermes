<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIAgent Sequence Diagram</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'JetBrains Mono', monospace;
      background: #020617;
      min-height: 100vh;
      padding: 2rem;
      color: white;
    }
    .container { max-width: 1300px; margin: 0 auto; }
    .header { margin-bottom: 2rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #34d399; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    h1 { font-size: 1.5rem; font-weight: 700; }
    .subtitle { color: #94a3b8; font-size: 0.875rem; margin-left: 1.75rem; }
    .diagram-container {
      background: rgba(15, 23, 42, 0.5);
      border-radius: 1rem;
      border: 1px solid #1e293b;
      padding: 1.5rem;
      overflow-x: auto;
    }
    svg { width: 100%; min-width: 1100px; display: block; }
    .footer { text-align: center; margin-top: 1.5rem; color: #475569; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-row">
        <div class="pulse-dot"></div>
        <h1>AIAgent — 时序图</h1>
      </div>
      <p class="subtitle">一次对话从用户输入到最终回复的完整链路</p>
    </div>

    <div class="diagram-container">
      <svg viewBox="0 0 1200 920">
        <defs>
          <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
          </pattern>
          <marker id="arrow-solid" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
          </marker>
          <marker id="arrow-back" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
          </marker>
        </defs>

        <rect width="100%" height="100%" fill="url(#grid)" />
        <text x="600" y="25" fill="white" font-size="13" font-weight="700" text-anchor="middle">一次对话的完整时序（非流式，单次 tool call 场景）</text>

        <!-- Lifelines -->
        <!-- 用户 -->
        <rect x="50" y="55" width="100" height="28" rx="4" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="100" y="73" fill="white" font-size="9" font-weight="600" text-anchor="middle">👤 用户</text>
        <line x1="100" y1="83" x2="100" y2="880" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- Gateway/CLI -->
        <rect x="210" y="55" width="130" height="28" rx="4" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
        <text x="275" y="73" fill="white" font-size="9" font-weight="600" text-anchor="middle">🌐 Gateway/CLI</text>
        <line x1="275" y1="83" x2="275" y2="880" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- AIAgent -->
        <rect x="400" y="55" width="130" height="28" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
        <text x="465" y="73" fill="white" font-size="9" font-weight="600" text-anchor="middle">🤖 AIAgent</text>
        <line x1="465" y1="83" x2="465" y2="880" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- conversation_loop -->
        <rect x="590" y="55" width="160" height="28" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
        <text x="670" y="73" fill="white" font-size="9" font-weight="600" text-anchor="middle">conversation_loop</text>
        <line x1="670" y1="83" x2="670" y2="880" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- system_prompt -->
        <rect x="800" y="55" width="140" height="28" rx="4" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
        <text x="870" y="73" fill="white" font-size="9" font-weight="600" text-anchor="middle">system_prompt</text>
        <line x1="870" y1="83" x2="870" y2="880" stroke="#34d399" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- LLM -->
        <rect x="1000" y="55" width="100" height="28" rx="4" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
        <text x="1050" y="73" fill="white" font-size="9" font-weight="600" text-anchor="middle">☁️ LLM</text>
        <line x1="1050" y1="83" x2="1050" y2="880" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,4"/>

        <!-- 1. 用户发消息 -->
        <text x="100" y="115" fill="#22d3ee" font-size="8">1</text>
        <path d="M 100 120 L 100 115 L 275 115 L 275 120" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="130" y="110" fill="#94a3b8" font-size="8">消息 / /command</text>

        <!-- 2. 创建/获取 Agent -->
        <text x="275" y="140" fill="#22d3ee" font-size="8">2</text>
        <path d="M 275 145 L 275 140 L 465 140 L 465 145" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="310" y="135" fill="#94a3b8" font-size="8">创建/获取 AIAgent 实例</text>

        <!-- 3. run_conversation() -->
        <text x="465" y="165" fill="#22d3ee" font-size="8">3</text>
        <path d="M 465 170 L 465 165 L 670 165 L 670 170" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="500" y="162" fill="#94a3b8" font-size="8">run_conversation(msg)</text>

        <!-- 4. _build_system_prompt -->
        <text x="670" y="195" fill="#22d3ee" font-size="8">4</text>
        <path d="M 670 200 L 670 195 L 870 195 L 870 200" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="710" y="192" fill="#94a3b8" font-size="8">_build_system_prompt()</text>

        <!-- 4b. 三层组装 -->
        <rect x="800" y="208" width="140" height="55" rx="4" fill="rgba(6, 78, 59, 0.2)" stroke="none"/>
        <text x="870" y="222" fill="#94a3b8" font-size="7" text-anchor="middle">stable(身份+规则)</text>
        <text x="870" y="237" fill="#94a3b8" font-size="7" text-anchor="middle">+ context(AGENTS.md)</text>
        <text x="870" y="252" fill="#94a3b8" font-size="7" text-anchor="middle">+ volatile(记忆+时间戳)</text>

        <path d="M 870 200 L 870 265" fill="none" stroke="#fbbf24" stroke-width="1" marker-end="url(#arrow-back)"/>
        <text x="878" y="278" fill="#fbbf24" font-size="7">缓存到 _cached_system_prompt</text>

        <!-- 5. 恢复/构建 system prompt -->
        <text x="670" y="295" fill="#22d3ee" font-size="8">5</text>
        <path d="M 465 300 L 465 295 L 670 295 L 670 300" fill="none" stroke="#22d3ee" stroke-width="1" marker-end="url(#arrow-solid)"/>
        <text x="500" y="292" fill="#94a3b8" font-size="8">恢复/构建 system prompt 缓存</text>

        <!-- 6. 构建 API 消息 -->
        <text x="465" y="325" fill="#94a3b8" font-size="8">6</text>
        <rect x="400" y="328" width="130" height="40" rx="4" fill="rgba(6, 78, 59, 0.15)" stroke="none"/>
        <text x="465" y="342" fill="#94a3b8" font-size="8" text-anchor="middle">拼接 API 消息:</text>
        <text x="465" y="358" fill="#94a3b8" font-size="7" text-anchor="middle">[system + user + history]</text>

        <!-- 7. LLM 调用 -->
        <text x="465" y="395" fill="#22d3ee" font-size="8">7</text>
        <path d="M 465 400 L 465 395 L 1050 395 L 1050 400" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="680" y="392" fill="#94a3b8" font-size="8">API 调用（流式/非流式）</text>

        <!-- 7b. LLM 处理 -->
        <rect x="1000" y="408" width="100" height="35" rx="4" fill="rgba(251, 146, 60, 0.15)" stroke="none"/>
        <text x="1050" y="422" fill="#94a3b8" font-size="7" text-anchor="middle">LLM 推理</text>
        <text x="1050" y="437" fill="#94a3b8" font-size="7" text-anchor="middle">tool_calls?</text>

        <!-- 8. 返回响应 -->
        <text x="1050" y="470" fill="#fbbf24" font-size="8">8</text>
        <path d="M 1050 475 L 1050 470 L 465 470 L 465 475" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-back)"/>
        <text x="700" y="467" fill="#94a3b8" font-size="8">LLM 响应: 文本 或 tool_calls</text>

        <!-- 9. 判断: 有 tool_calls? -->
        <text x="465" y="500" fill="#a78bfa" font-size="8">9</text>
        <polygon points="420,505 510,505 525,520 510,535 420,535 405,520" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1"/>
        <text x="465" y="524" fill="white" font-size="8" font-weight="600" text-anchor="middle">有 tool_calls?</text>

        <!-- 9a. 无 tool_calls → 返回最终响应 -->
        <text x="360" y="560" fill="#22d3ee" font-size="8">10</text>
        <path d="M 405 565 L 275 565 L 275 560 L 100 560" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-solid)"/>
        <text x="280" y="555" fill="#94a3b8" font-size="8">无 tool_calls → 最终回复给用户</text>

        <!-- 9b. 有 tool_calls → 执行 -->
        <text x="550" y="560" fill="#22d3ee" font-size="8">10</text>
        <path d="M 525 565 L 670 565 L 670 560" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="570" y="555" fill="#94a3b8" font-size="8">_execute_tool_calls()</text>

        <!-- 10a. 工具执行 -->
        <rect x="590" y="575" width="380" height="80" rx="6" fill="rgba(120, 53, 15, 0.2)" stroke="#fbbf24" stroke-width="1"/>
        <text x="780" y="593" fill="#fbbf24" font-size="9" font-weight="600" text-anchor="middle">工具执行</text>
        <text x="610" y="612" fill="#94a3b8" font-size="8">├─ _invoke_tool(name, args) → handle_function_call()</text>
        <text x="610" y="630" fill="#94a3b8" font-size="8">├─ 并发模式: 同时执行所有工具</text>
        <text x="610" y="648" fill="#94a3b8" font-size="8">└─ 串行模式: 按顺序执行 (降级状态)</text>

        <!-- 10b. 工具结果 → 追加到消息 -->
        <path d="M 670 655 L 670 670" fill="none" stroke="#34d399" stroke-width="1"/>

        <text x="465" y="695" fill="#34d399" font-size="8">11</text>
        <rect x="400" y="698" width="130" height="30" rx="4" fill="rgba(6, 78, 59, 0.15)" stroke="none"/>
        <text x="465" y="712" fill="#94a3b8" font-size="8" text-anchor="middle">追加 tool result 到消息</text>
        <text x="465" y="722" fill="#94a3b8" font-size="7" text-anchor="middle">api_call_count++</text>

        <!-- 11. 循环 → 回到 LLM -->
        <text x="465" y="750" fill="#22d3ee" font-size="8">12</text>
        <path d="M 465 755 L 465 750 L 1050 750 L 1050 755" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="680" y="747" fill="#94a3b8" font-size="8">再次调用 LLM（带上 tool result）</text>

        <!-- 最大迭代检查 -->
        <rect x="400" y="770" width="130" height="30" rx="4" fill="rgba(136, 19, 55, 0.2)" stroke="#fb7185" stroke-width="1"/>
        <text x="465" y="785" fill="#fb7185" font-size="7" text-anchor="middle">max_iterations</text>
        <text x="465" y="795" fill="#fb7185" font-size="7" text-anchor="middle">默认 90 轮</text>

        <!-- 最终响应 -->
        <text x="465" y="830" fill="#22d3ee" font-size="8">13</text>
        <path d="M 465 835 L 465 830 L 275 830 L 275 835 L 100 835" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="300" y="827" fill="#94a3b8" font-size="8">最终回复 → 用户</text>

        <!-- Legend -->
        <rect x="20" y="860" width="600" height="30" rx="6" fill="rgba(15, 23, 42, 0.6)" stroke="#1e293b" stroke-width="1"/>
        <line x1="32" y1="875" x2="52" y2="875" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-solid)"/>
        <text x="58" y="879" fill="#94a3b8" font-size="8">调用 / 消息传递</text>
        <line x1="200" y1="875" x2="220" y2="875" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-back)"/>
        <text x="226" y="879" fill="#94a3b8" font-size="8">返回结果</text>
        <polygon points="370,870 380,875 370,880 360,875" fill="rgba(76, 29, 149, 0.3)" stroke="#a78bfa" stroke-width="1"/>
        <text x="388" y="879" fill="#94a3b8" font-size="8">条件判断</text>
      </svg>
    </div>
    <p class="footer">Sequence Diagram · 一次对话的完整链路</p>
  </div>
</body>
</html>
